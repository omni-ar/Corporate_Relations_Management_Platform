services:
  app:
    build:
      context: .
      target: production
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/tpo_ops
      - NODE_ENV=production
      - JWT_ACCESS_SECRET=change_me_in_production_access_secret
      - JWT_REFRESH_SECRET=change_me_in_production_refresh_secret
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Schema migration helper — runs once, pushes Drizzle schema, then exits
  db-migrate:
    build:
      context: .
      target: builder
    command: ["npx", "drizzle-kit", "push", "--force"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/tpo_ops
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tpo_ops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
